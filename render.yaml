databases:
  - name: support-agent-db
    plan: free
    databaseName: supportdb
    user: supportuser

services:
  # Backend API
  - type: web
    name: support-agent-api
    env: java
    rootDir: backend
    buildCommand: ./gradlew bootJar
    startCommand: java -jar build/libs/*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: support-agent-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: support-agent-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: support-agent-db
          property: password
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: web
    name: support-agent-ui
    runtime: static
    buildCommand: echo "No build needed"
    staticPublishPath: frontend
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
