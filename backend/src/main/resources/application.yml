server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:supportdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: embedded

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
  timeout-seconds: 30

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: claude-3-haiku-20240307
  max-tokens: 1024
  timeout-seconds: 30

cors:
  allowed-origins: "*"

logging:
  level:
    com.support.agent: DEBUG
    org.springframework.web: INFO
