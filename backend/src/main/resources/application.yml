server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:supportdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
  timeout-seconds: 30

cors:
  allowed-origins: "*"

logging:
  level:
    com.support.agent: DEBUG
    org.springframework.web: INFO
